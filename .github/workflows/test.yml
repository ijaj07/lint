on:
  push:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Superlinter
        uses: github/super-linter@v3
        env:
          DEFAULT_BRANCH: ["main"]
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      